name: Retrain Models

# Runs every 14 days (matches 10-day prediction horizon)
# Also can be triggered manually from GitHub Actions tab
on:
  schedule:
    - cron: '0 6 1,15 * *'  # 6 AM UTC on 1st and 15th of each month
  workflow_dispatch:  # manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.0,<2.6"
          python -m pip install -r requirements-training.txt
          python -m pip install httpx nest_asyncio || true

      - name: Clear stale cache data
        run: |
          # Remove old cached data so fresh Alpaca data is fetched
          rm -f data/prices_*.csv data/volumes_*.csv
          rm -f data/cross_asset.csv data/sentiment.json

      - name: Retrain CrossMamba + LightGBM
        run: |
          python retrain.py --models crossmamba,lightgbm
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify models load
        run: |
          python -c "
          import pickle
          for name in ['latest_crossmamba_model', 'latest_lightgbm_model']:
              path = f'models/{name}.pkl'
              try:
                  data = pickle.load(open(path, 'rb'))
                  n_feat = len(data.get('feature_names', []))
                  print(f'{name}: OK ({n_feat} features)')
              except Exception as e:
                  print(f'{name}: FAILED - {e}')
                  exit(1)
          "

      - name: Commit and push retrained models
        run: |
          git config user.name "Kymi808"
          git config user.email "zeng.kyle13@gmail.com"
          git add models/latest_crossmamba_model.pkl models/latest_lightgbm_model.pkl
          # Only commit if models actually changed
          if git diff --cached --quiet; then
            echo "No model changes to commit"
          else
            git commit -m "Automated retrain: CrossMamba + LightGBM ($(date +%Y-%m-%d))"
            git pull --rebase origin main
            git push
          fi
